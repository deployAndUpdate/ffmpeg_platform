name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go mod verify
        run: go mod verify

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true
      - name: unit tests
        run: go test -race -count=1 -short ./...

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true
      - name: build all packages
        run: go build -trimpath ./...
      - name: build binaries
        run: |
          CGO_ENABLED=0 go build -trimpath -o /dev/null ./cmd/scheduler
          CGO_ENABLED=0 go build -trimpath -o /dev/null ./cmd/worker

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: video
          POSTGRES_PASSWORD: video
          POSTGRES_DB: video_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U video -d video_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DB_DSN: postgres://video:video@localhost:5432/video_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true
      - name: integration tests
        run: go test -race -count=1 -p 1 -tags=integration ./internal/store/... ./internal/api/...
