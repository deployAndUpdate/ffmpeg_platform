name: go-distributed-system

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-video}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-video}
      POSTGRES_DB: ${POSTGRES_DB:-video}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_DSN: postgres://${POSTGRES_USER:-video}:${POSTGRES_PASSWORD:-video}@postgres:5432/${POSTGRES_DB:-video}?sslmode=disable
    networks:
      - backend

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: scheduler
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      DB_DSN: postgres://${POSTGRES_USER:-video}:${POSTGRES_PASSWORD:-video}@postgres:5432/${POSTGRES_DB:-video}?sslmode=disable
      SCHEDULER_ADDR: :8080
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-536870912}
      SCHEDULER_UPLOAD_TIMEOUT: ${SCHEDULER_UPLOAD_TIMEOUT:-30m}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_REGION: ${R2_REGION:-auto}
      R2_PRESIGN_UPLOAD_TTL: ${R2_PRESIGN_UPLOAD_TTL:-1h}
      R2_PRESIGN_DOWNLOAD_TTL: ${R2_PRESIGN_DOWNLOAD_TTL:-1h}
      SCHEDULER_API_KEY_REQUIRED: ${SCHEDULER_API_KEY_REQUIRED:-false}
      SCHEDULER_CLIENT_API_KEY: ${SCHEDULER_CLIENT_API_KEY:-}
      SCHEDULER_WORKER_API_KEY: ${SCHEDULER_WORKER_API_KEY:-}
      SCHEDULER_ADMIN_API_KEY: ${SCHEDULER_ADMIN_API_KEY:-}
    ports:
      - "${SCHEDULER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - backend

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    depends_on:
      scheduler:
        condition: service_healthy
    environment:
      SCHEDULER_URL: http://scheduler:8080
      SCHEDULER_WORKER_API_KEY: ${SCHEDULER_WORKER_API_KEY:-}
      WORKER_MAX_PARALLEL_JOBS: ${WORKER_MAX_PARALLEL_JOBS:-1}
      WORKER_GPU_AVAILABLE: ${WORKER_GPU_AVAILABLE:-false}
      WORKER_TEMP_DIR: ${WORKER_TEMP_DIR:-/tmp/jobs}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_REGION: ${R2_REGION:-auto}
    volumes:
      - jobdata:/data
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  jobdata:
