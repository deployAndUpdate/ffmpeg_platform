# Integration test stack: PostgreSQL + RabbitMQ (make test-integration).
name: go-distributed-system-test

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: video_test
      POSTGRES_PASSWORD: video_test
      POSTGRES_DB: video_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video_test -d video_test"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  rabbitmq-test:
    image: rabbitmq:3-management-alpine
    ports:
      - "5673:5672"
    tmpfs:
      - /var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 10s
